name: CI/CD

on:
  # Run on PRs (against main) and on direct pushes to main only. Feature-branch
  # pushes are covered by the PR event, so this avoids running CI twice per PR
  # (a push build + a pull_request build) with two separate status contexts.
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Key on the PR head ref when present so the push and pull_request events for
  # the same branch share a group and de-duplicate instead of running twice.
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# NOTE ON REQUIRED CHECKS (path-aware CI without breaking the merge gate):
# This workflow has NO workflow-level `paths:` filter on purpose. The two heavy
# required jobs (build/e2e) ALWAYS RUN and always report `success` — the
# path-awareness is applied at the STEP level, not by skipping the job.
#   - A workflow-level path skip leaves a required check stuck in "Expected" /
#     pending forever -> PR becomes unmergeable.
#   - A JOB-LEVEL `if:` skip reports the check as "Skipped". This repo's RULESET
#     treats a skipped required check as NOT satisfied (it wants a `success`
#     conclusion), so job-level skips made every .kiro/**- or docs-only PR
#     unmergeable ("N of N required status checks are expected").
#   - Therefore build/e2e run unconditionally (subject only to their upstreams
#     passing) and use STEP-LEVEL `if:` guards keyed off the `changes` detector:
#     when no relevant app code changed, the heavy steps are skipped and a cheap
#     no-op step reports the job green. The four required check names (Lint,
#     Unit Tests, Build, E2E) thus always conclude `success` on a healthy PR,
#     whether or not app code changed. This needs NO ruleset/admin change.
#
# lint + test + workflow-regression always run: they are fast and they guard the
# .kiro/** merge-gate machinery, which lives outside src/.

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      shared: ${{ steps.filter.outputs.shared }}
      e2e: ${{ steps.filter.outputs.e2e }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/client/**'
              - 'index.html'
              - 'public/**'
            backend:
              - 'src/server/**'
            shared:
              - 'src/shared/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
            config:
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'

  lint:
    name: Lint (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  smoke:
    name: Smoke Test (server boot)
    runs-on: ubuntu-latest
    needs: [changes, lint]
    # Server boot only matters when the server, its shared deps, or build config change.
    if: ${{ always() && needs.lint.result == 'success' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.config == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run smoke-test

  workflow-regression:
    name: Workflow Automation Regression (unit tier)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Runs on EVERY PR (not path-filtered) so the merge-gate + conversation
      # machinery is always covered by the main CI surface, not only by the
      # separate path-filtered workflow. This closes the gap where a red
      # regression tier could not block a merge.
      - run: npx vitest --run .kiro/specs/cubic-ai-review-integration/__tests__ .kiro/specs/pr-conversation-monitoring/__tests__

  build:
    name: Build (vite)
    runs-on: ubuntu-latest
    needs: [changes, test, smoke]
    # ALWAYS runs so the required check always concludes (a job-level skip would
    # leave it unsatisfied under this repo's ruleset). `always()` so a skipped
    # `smoke` does not cascade-skip it; still require `test` to pass and block if
    # `smoke` actually ran and failed. The heavy build is STEP-gated below on
    # whether app code (frontend), shared deps, or build config actually changed.
    if: ${{ always() && needs.test.result == 'success' && needs.smoke.result != 'failure' }}
    env:
      RUN_BUILD: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.config == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ env.RUN_BUILD == 'true' }}
        with:
          node-version: 22
          cache: npm
      - if: ${{ env.RUN_BUILD == 'true' }}
        run: npm ci
      - if: ${{ env.RUN_BUILD == 'true' }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        if: ${{ env.RUN_BUILD == 'true' }}
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
      - if: ${{ env.RUN_BUILD != 'true' }}
        run: echo "No app code changed — build not required for this PR. Reporting success."

  e2e:
    name: E2E Tests (playwright)
    runs-on: ubuntu-latest
    needs: [changes, build]
    # ALWAYS runs so the required check always concludes (a job-level skip would
    # leave it unsatisfied under this repo's ruleset). E2E boots its own dev
    # servers (it does not consume the build artifact), so it can run even when
    # `build` did no work. `always()` prevents a skipped/no-op `build` from
    # cascade-skipping e2e; a failed `build` still blocks it. The heavy Playwright
    # run is STEP-gated below on whether any app code or the e2e harness changed.
    if: ${{ always() && needs.build.result != 'failure' }}
    env:
      RUN_E2E: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.config == 'true' || needs.changes.outputs.e2e == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ env.RUN_E2E == 'true' }}
        with:
          node-version: 22
          cache: npm
      - if: ${{ env.RUN_E2E == 'true' }}
        run: npm ci
      - if: ${{ env.RUN_E2E == 'true' }}
        run: npx playwright install --with-deps chromium
      - if: ${{ env.RUN_E2E == 'true' }}
        run: npx playwright test
      - if: ${{ env.RUN_E2E != 'true' }}
        run: echo "No app code or e2e harness changed — E2E not required for this PR. Reporting success."
