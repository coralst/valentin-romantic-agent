name: Workflow Automation Regression

# Guardrail (cubic-ai-review-integration Req 11–13): whenever a PR touches the
# agentic workflow-automation content, verify the multi-agent conversation flow and
# the merge gate machinery still work — so master can never silently break again.
#
# NOTE: The deterministic unit tier ALSO runs as the `workflow-regression` job in
# ci.yml on every PR, so it is covered by the main CI surface regardless of paths.
# This path-filtered workflow additionally carries the self-cleaning LIVE tier.

on:
  pull_request:
    branches: [main]
    paths:
      - '.kiro/steering/git-workflow.md'
      - '.kiro/agents/**/prompt.md'
      - '.kiro/hooks/**'
      - '.kiro/skills/pr-monitoring/**'
      - '.kiro/specs/cubic-ai-review-integration/**'
      - '.kiro/specs/pr-conversation-monitoring/**'
      - '.github/workflows/workflow-automation-regression.yml'
      - '.github/workflows/ci.yml'

concurrency:
  group: wf-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tier:
    name: Regression Unit Tier (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Run the regression suite + the existing pr-monitoring suite deterministically.
      - name: Run regression unit tier
        run: npx vitest --run .kiro/specs/cubic-ai-review-integration/__tests__ .kiro/specs/pr-conversation-monitoring/__tests__

  live-tier:
    name: Regression Live Tier (self-cleaning real PR)
    runs-on: ubuntu-latest
    needs: unit-tier
    # Only runs when explicitly enabled; skipped on forks / without the flag so the
    # unit tier remains the unconditional gate.
    if: ${{ vars.RUN_LIVE_WORKFLOW_TESTS == '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run self-cleaning live integration tier
        env:
          RUN_LIVE_WORKFLOW_TESTS: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .kiro/specs/cubic-ai-review-integration/__tests__/workflow-selftest-live.mjs
